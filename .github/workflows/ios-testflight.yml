name: iOS → TestFlight

# Build cloud iOS (Xcode 26 requis par Apple) puis upload TestFlight.
# Déclenchement manuel (Actions) OU à chaque push sur la branche de travail.
on:
  workflow_dispatch:
  push:
    branches:
      - feat/systeme-energie

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 60
    # Identifiants NON secrets (le secret reste le .p8). En clair = pas de faute de frappe.
    env:
      ASC_KEY_ID: KHFCLB86L9
      ASC_ISSUER_ID: 3ee169dd-aa33-4e93-a93c-e998185376b3
      APPLE_TEAM_ID: 9D78779LKL
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Xcode 26+ : indispensable, Apple refuse les builds < SDK iOS 26.
      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Versions (vérif SDK)
        run: |
          xcodebuild -version
          echo "--- SDK iOS dispo ---"
          xcodebuild -showsdks | grep -i iphoneos || true

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rust + cible iOS
        run: |
          rustup update stable
          rustup target add aarch64-apple-ios

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-ios-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-ios-

      - name: Dépendances frontend
        run: npm ci

      # Clé API App Store Connect (signature cloud-managed + upload).
      - name: Préparer + vérifier la clé API
        env:
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: |
          set -e
          # Nettoie tout espace/retour-ligne parasite des secrets saisis à la main.
          KID=$(printf '%s' "$ASC_KEY_ID" | tr -d '[:space:]')
          ISS=$(printf '%s' "$ASC_ISSUER_ID" | tr -d '[:space:]')
          mkdir -p ~/.appstoreconnect/private_keys
          printf '%s' "$ASC_KEY_P8" | tr -d '[:space:]' | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${KID}.p8
          F8=~/.appstoreconnect/private_keys/AuthKey_${KID}.p8
          # Empreinte (ne révèle pas la clé) — DOIT être : taille=257 lignes=5 sha12=28ef64eb3388
          echo "EMPREINTE p8 -> taille=$(wc -c < "$F8") lignes=$(wc -l < "$F8") sha12=$(shasum -a 256 "$F8" | cut -c1-12)"
          # Sanity : le .p8 doit être une clé privée PEM valide.
          head -1 "$F8" | grep -q "BEGIN PRIVATE KEY" \
            || { echo "::error::ASC_KEY_P8 corrompu (base64 invalide)"; exit 1; }
          echo "✅ .p8 en place (l'auth réelle se fait via fastlane à l'upload)."

      # 1) Archive NON signée (aucun certificat local requis).
      - name: Archive (non signée)
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          npx tauri ios build --target aarch64 --archive-only --no-sign \
            --build-number ${{ github.run_number }}

      # Import du certificat de distribution (.p12) + profil App Store dans un
      # trousseau temporaire → signature MANUELLE (pas d'auth API pour signer).
      - name: Importer certificat + profil
        env:
          DIST_CERT_P12: ${{ secrets.DIST_CERT_P12 }}
          DIST_CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
          APP_STORE_PROFILE: ${{ secrets.APP_STORE_PROFILE }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KP="$(openssl rand -base64 24)"
          security create-keychain -p "$KP" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KP" "$KEYCHAIN"
          echo "$DIST_CERT_P12" | base64 --decode > "$RUNNER_TEMP/dist.p12"
          security import "$RUNNER_TEMP/dist.p12" -k "$KEYCHAIN" -P "$DIST_CERT_PASSWORD" -A -t cert -f pkcs12
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KP" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
          security default-keychain -s "$KEYCHAIN"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$APP_STORE_PROFILE" | base64 --decode > "$HOME/Library/MobileDevice/Provisioning Profiles/app-store.mobileprovision"
          echo "Identités disponibles :"; security find-identity -v -p codesigning "$KEYCHAIN"

      # 2) Export SIGNÉ (signature MANUELLE : certificat + profil fournis).
      - name: Export signé (App Store)
        run: |
          cat > /tmp/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key><string>automatic</string>
            <key>destination</key><string>export</string>
          </dict></plist>
          EOF
          rm -rf /tmp/export
          # Pas de -allowProvisioningUpdates : on signe avec le certificat + profil
          # géré déjà installés (aucun appel à Apple → pas de 401).
          xcodebuild -exportArchive \
            -archivePath "src-tauri/gen/apple/build/app_iOS.xcarchive" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath /tmp/export
          ls -lh /tmp/export/*.ipa

      - name: Sauvegarde de l'IPA (artefact)
        uses: actions/upload-artifact@v4
        with:
          name: Broc-ios-ipa
          path: /tmp/export/*.ipa

      # 3) Upload TestFlight via la clé API.
      # Upload via fastlane (spaceship) plutôt qu'altool : altool de Xcode 26.3
      # rejette l'auth par clé API (401) alors que la clé est valide.
      - name: Upload TestFlight (fastlane)
        env:
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: |
          P8B64=$(printf '%s' "$ASC_KEY_P8" | tr -d '[:space:]')
          cat > "$RUNNER_TEMP/asc_key.json" <<EOF
          {
            "key_id": "${ASC_KEY_ID}",
            "issuer_id": "${ASC_ISSUER_ID}",
            "key": "${P8B64}",
            "is_key_content_base64": true,
            "in_house": false
          }
          EOF
          IPA=$(ls /tmp/export/*.ipa | head -1)
          echo "Upload de $IPA via fastlane"
          fastlane pilot upload \
            --api_key_path "$RUNNER_TEMP/asc_key.json" \
            --ipa "$IPA" \
            --app_identifier com.guigousse.broc \
            --skip_submission true \
            --skip_waiting_for_build_processing true
