<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" width="600" height="220">
  
  <defs>
    <linearGradient id="brass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D9C07A"></stop>
      <stop offset="0.5" stop-color="#C5A059"></stop>
      <stop offset="1" stop-color="#8A6A26"></stop>
    </linearGradient>
  </defs>

  <g fill="url(#brass)" stroke="#8A6A26" stroke-width="0.75">
    
    <g transform="translate(300 40)">
      <rect x="-1" y="-32" width="2" height="22"></rect>
      <g transform="rotate(20)"><rect x="-1" y="-32" width="2" height="18"></rect></g>
      <g transform="rotate(-20)"><rect x="-1" y="-32" width="2" height="18"></rect></g>
      <g transform="rotate(40)"><rect x="-1" y="-32" width="2" height="14"></rect></g>
      <g transform="rotate(-40)"><rect x="-1" y="-32" width="2" height="14"></rect></g>
      <g transform="rotate(60)"><rect x="-1" y="-32" width="2" height="10"></rect></g>
      <g transform="rotate(-60)"><rect x="-1" y="-32" width="2" height="10"></rect></g>
      <circle r="4"></circle>
    </g>
  </g>

  
  <g stroke="#C5A059" fill="none">
    <line x1="60" y1="60" x2="540" y2="60" stroke-width="1.2"></line>
    <line x1="60" y1="64" x2="540" y2="64" stroke-width="0.6"></line>
    <line x1="60" y1="180" x2="540" y2="180" stroke-width="1.2"></line>
    <line x1="60" y1="176" x2="540" y2="176" stroke-width="0.6"></line>
  </g>

  
  <g font-family="Cinzel, serif" font-weight="700" font-size="92" letter-spacing="14" text-anchor="middle" fill="#1A3326">
    <text x="300" y="148">BROC</text>
  </g>

  
  <g font-family="Courier Prime, monospace" font-size="11" letter-spacing="6" text-anchor="middle" fill="#8A6A26">
    <text x="300" y="200">— EST. EN BROCANTE —</text>
  </g>
</svg>