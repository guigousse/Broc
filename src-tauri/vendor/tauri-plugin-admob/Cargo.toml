[package]
name = "tauri-plugin-admob"
version = "0.1.0"
edition = "2021"
rust-version = "1.77.2"
links = "tauri-plugin-admob"

[build-dependencies]
tauri-plugin = { version = "2", features = ["build"] }

[dependencies]
tauri = { version = "2" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
